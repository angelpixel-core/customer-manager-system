---
# Stage 1 (Reek) baseline configuration.
# Rationale:
# - We disable framework-noisy smells that are low-signal for this codebase
#   (`IrresponsibleModule`, `UtilityFunction`) to focus on actionable design debt.
# - We keep complexity/coupling smells enabled to prevent new architectural debt.

exclude_paths:
  - db/migrate
  - node_modules
  - vendor

detectors:
  IrresponsibleModule:
    enabled: false

  UtilityFunction:
    enabled: false

  UncommunicativeVariableName:
    accept:
      - e
      - r

directories:
  "app/admin/infrastructure/events":
    TooManyStatements:
      max_statements: 8
  "lib/platform/events":
    TooManyStatements:
      max_statements: 12
